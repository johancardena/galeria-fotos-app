<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Tab 1</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding ion-text-center">

  <ion-grid>
    <ion-row>
      <ion-col size="12">

        <ion-button expand="block" (click)="tomarFoto()" class="ion-margin-bottom">
          📸 Tomar foto
        </ion-button>

        <ion-button expand="block" (click)="mostrarAlerta()">
          🔔 Mostrar alerta
        </ion-button>

      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
